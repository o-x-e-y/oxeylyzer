sources = [ "../../text/latvian" ]

inherits = [ "./default.toml" ]

letters_to_lowercase = "āīēš"

[multiple]
uppercase_versions = true # this tries to create a transposition for Č, Ķ etc as well.
list = [
    ["č", "*c"],
    ["ķ", "*k"],
    ["ļ", "*l"],
    ["ņ", "*n"],
    ["ū", "*u"],
    ["ž", "*z"],
    ["ģ", "*g"],
]
